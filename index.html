<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/svg+xml" href="/favicon.svg">
        <title>Elm Origin</title>
        <!-- Preconnect to Google Fonts for faster font loading -->
        <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <!-- Primary font loaded eagerly to prevent FOUT -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap">
        <!-- Theme initializer: apply saved theme before React mounts to prevent flash -->
        <script>
          (function(){
            try {
              var t = localStorage.getItem('elmorbit-theme');
              var d = document.documentElement;
              if (t === 'dark') { d.classList.remove('light'); d.classList.add('dark'); }
              else { d.classList.remove('dark'); d.classList.add('light'); }
            } catch(e) {}
          })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
